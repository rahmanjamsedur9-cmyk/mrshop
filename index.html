<!DOCTYPE html>
<html>
<head>
<title>MR Shop</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0a3d62;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.product img{
width:100%;
border-radius:8px;
}

button{
background:#27ae60;
color:white;
border:none;
padding:10px;
border-radius:5px;
}

</style>

</head>

<body>

<header>MR Sports Shop</header>

<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h3>Sports Shoes</h3>
<p>1500 টাকা</p>
<button>Order Now</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<h3>T Shirt</h3>
<p>800 টাকা</p>
<button>Order Now</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1575361204480-aadea25e6e68">
<h3>Football</h3>
<p>1200 টাকা</p>
<button>Order Now</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1599058917765-a780eda07a3e">
<h3>Cricket Bat</h3>
<p>2000 টাকা</p>
<button>Order Now</button>
</div>

</div>

</body>
</html>
